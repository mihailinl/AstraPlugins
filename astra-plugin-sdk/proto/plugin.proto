// --- Stars ---

message MarketplaceToggleStarRequest {
    string listing_id = 1;
    bool star = 2;                     // true = star, false = unstar
}

message MarketplaceToggleStarResponse {
    bool starred = 1;
    int32 new_star_count = 2;
}

// --- Reviews ---

message MarketplaceSubmitReviewRequest {
    string listing_id = 1;
    int32 rating = 2;                  // 1–5
    string review_text = 3;
}

message MarketplaceReview {
    string id = 1;
    string user_id = 2;
    string user_name = 3;
    int32 rating = 4;
    string review_text = 5;
    Timestamp created_at = 6;
}

message MarketplaceGetReviewsRequest {
    string listing_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message MarketplaceGetReviewsResponse {
    repeated MarketplaceReview reviews = 1;
    int32 total = 2;
}

// --- Reports ---

message MarketplaceReportRequest {
    string listing_id = 1;
    string reason = 2;                 // spam, malicious, broken, inappropriate, copyright, other
    string details = 3;
}

// ============ OOBE Service ============

service OobeService {
    // Discover installed applications (Start Menu, Steam, Epic Games Store)
    rpc DiscoverApps(Empty) returns (DiscoverAppsResponse);
    // Filter apps using AI to remove system utilities, keeping user-facing programs
    rpc FilterApps(FilterAppsRequest) returns (stream OobeProgressEvent);
    // Generate trigger phrases for apps (phonetic transliterations for non-English locales)
    rpc GenerateTriggers(GenerateTriggersRequest) returns (stream OobeProgressEvent);
}

message OobeAppEntry {
    string app_name = 1;
    string exe_path = 2;
}

message DiscoverAppsResponse {
    repeated OobeAppEntry apps = 1;
}

message FilterAppsRequest {
    repeated OobeAppEntry apps = 1;
}

message GenerateTriggersRequest {
    repeated OobeAppEntry apps = 1;
    string locale = 2;
}

message OobeProgressEvent {
    oneof event {
        OobeBatchProgress batch_progress = 1;
        FilterAppsResult filter_result = 2;
        GenerateTriggersResult triggers_result = 3;
        string error = 4;
    }
}

message OobeBatchProgress {
    int32 current_batch = 1;
    int32 total_batches = 2;
    string phase = 3;
}

message FilterAppsResult {
    repeated OobeAppEntry apps = 1;
}

message GenerateTriggersResult {
    map<string, TriggerPhrases> triggers = 1;
}

message TriggerPhrases {
    repeated string phrases = 1;
}

// ===== Widget Data =====

message WidgetDataRequest {
    string widget_type = 1;  // "notes", "reminders", "calendar", "tasks"
}

message SaveWidgetDataRequest {
    string widget_type = 1;
    string data = 2;  // JSON string
}

message WidgetDataResponse {
    string data = 1;  // JSON string
}

// ============ Plugin Service (UI-facing, daemon manages plugins) ============

service PluginService {
    // List all installed plugins with status
    rpc ListPlugins(Empty) returns (PluginListResponse);

    // Install a plugin from the registry
    rpc InstallPlugin(InstallPluginRequest) returns (PluginStatusMsg);

    // Uninstall a plugin
    rpc UninstallPlugin(PluginIdRequest) returns (Empty);

    // Enable/disable a plugin
    rpc SetPluginEnabled(SetPluginEnabledRequest) returns (Empty);

    // Start a stopped plugin
    rpc StartPlugin(PluginIdRequest) returns (Empty);

    // Stop a running plugin
    rpc StopPlugin(PluginIdRequest) returns (Empty);

    // Get plugin config schema + current values
    rpc GetPluginConfig(PluginIdRequest) returns (PluginConfigResponse);

    // Update plugin config
    rpc UpdatePluginConfig(UpdatePluginConfigRequest) returns (Empty);

    // Browse plugin registry
    rpc BrowsePluginRegistry(PluginBrowseRequest) returns (PluginBrowseResponse);

    // Check for updates on installed plugins
    rpc CheckPluginUpdates(Empty) returns (PluginUpdatesResponse);

    // Update a plugin to latest version
    rpc UpdatePlugin(PluginIdRequest) returns (PluginStatusMsg);

    // Sideload a plugin from local path (dev mode)
    rpc SideloadPlugin(SideloadPluginRequest) returns (PluginStatusMsg);

    // Import a plugin from a local .astraplugin ZIP file
    rpc ImportPluginFile(ImportPluginFileRequest) returns (PluginStatusMsg);

    // Get logs from a plugin (last N lines)
    rpc GetPluginLogs(PluginLogsRequest) returns (PluginLogsResponse);

    // Get all UI contributions from all running plugins
    rpc GetAllUiContributions(Empty) returns (AllUiContributionsResponse);

    // Get active theme contributions from plugins
    rpc GetActiveThemes(Empty) returns (ActiveThemesResponse);

    // Forward a UI call to a plugin's backend
    rpc CallPluginFromUi(CallPluginFromUiRequest) returns (CallPluginFromUiResponse);
}

// ============ Plugin Host Service (daemon exposes, plugins call into) ============

service PluginHostService {
    // Plugin registration handshake
    rpc Register(PluginRegisterRequest) returns (PluginRegisterResponse);

    // Subscribe to daemon events (filtered)
    rpc SubscribeEvents(PluginEventFilter) returns (stream PluginEventMsg);

    // Send a chat message (for client plugins)
    rpc SendChatMessage(PluginChatRequest) returns (stream PluginChatChunk);

    // Fire a custom trigger (for trigger plugins)
    rpc FireTrigger(PluginFireTriggerRequest) returns (Empty);

    // Get plugin's own config
    rpc GetPluginSelfConfig(PluginSelfIdRequest) returns (PluginSelfConfigResponse);

    // Log a message (forwarded to daemon log buffer)
    rpc PluginLog(PluginLogRequest) returns (Empty);

    // Get daemon info (version, state, port)
    rpc GetDaemonInfo(Empty) returns (PluginDaemonInfoResponse);

    // Set a variable in the daemon's variable context
    rpc SetVariable(PluginSetVariableRequest) returns (Empty);

    // Set theme contribution (colors, wallpaper, shader)
    rpc SetThemeContribution(PluginThemeContribution) returns (Empty);

    // Push a message to this plugin's UI iframes
    rpc PushToUi(PluginUiPushRequest) returns (Empty);
}

// ============ Plugin Capability Service (plugin exposes, daemon calls) ============

service PluginCapabilityService {
    // ── Tools ──
    rpc ListTools(Empty) returns (PluginToolListResponse);
    rpc CallTool(PluginCallToolRequest) returns (PluginCallToolResponse);

    // ── TTS ──
    rpc TtsSynthesize(PluginTtsSynthesizeRequest) returns (PluginTtsSynthesizeResponse);
    rpc TtsSynthesizeStream(PluginTtsSynthesizeRequest) returns (stream PluginAudioChunk);
    rpc TtsListVoices(Empty) returns (PluginTtsVoicesResponse);

    // ── STT ──
    rpc SttProcess(stream PluginAudioChunk) returns (stream PluginSttEvent);
    rpc SttGetLanguages(Empty) returns (PluginSttLanguagesResponse);

    // ── AI Provider ──
    rpc AiComplete(PluginAiCompleteRequest) returns (stream PluginAiStreamChunk);
    rpc AiGetModels(Empty) returns (PluginAiModelsResponse);

    // ── Actions ──
    rpc ExecuteAction(PluginExecuteActionRequest) returns (PluginExecuteActionResponse);
    rpc GetPluginActionTypes(Empty) returns (PluginActionTypesResponse);

    // ── Triggers ──
    rpc GetPluginTriggerTypes(Empty) returns (PluginTriggerTypesResponse);

    // ── UI ──
    rpc GetUiContributions(Empty) returns (PluginUiContributionsResponse);
    rpc CallFromUi(PluginUiCallRequest) returns (PluginUiCallResponse);

    // ── Lifecycle ──
    rpc OnConfigChanged(PluginConfigChangedMsg) returns (Empty);
    rpc OnActiveTriggers(PluginActiveTriggersMsg) returns (Empty);
    rpc Shutdown(Empty) returns (Empty);
    rpc HealthCheck(Empty) returns (PluginHealthResponse);
}

// ============ Plugin Messages — Management (PluginService) ============

message PluginStatusMsg {
    string id = 1;
    string name = 2;
    string version = 3;
    string description = 4;
    string author = 5;
    string status = 6;                   // "stopped", "starting", "running", "error", "disabled"
    string error = 7;
    repeated string capabilities = 8;    // ["tools", "tts", "ai_provider", ...]
    bool enabled = 9;
    bool has_config = 10;
    bool has_update = 11;
    string latest_version = 12;
    string icon_url = 13;
    string homepage = 14;
}

message PluginListResponse {
    repeated PluginStatusMsg plugins = 1;
}

message PluginIdRequest {
    string plugin_id = 1;
}

message SetPluginEnabledRequest {
    string plugin_id = 1;
    bool enabled = 2;
}

message InstallPluginRequest {
    string plugin_id = 1;
    bool auto_start = 2;
}

message PluginConfigResponse {
    string plugin_id = 1;
    string config_schema_json = 2;       // JSON Schema from manifest
    string config_values_json = 3;       // Current config values as JSON
    repeated FieldDefinitionMsg fields = 4;  // Pre-converted for UI rendering
}

message UpdatePluginConfigRequest {
    string plugin_id = 1;
    string config_json = 2;              // New config values as JSON
}

message PluginBrowseRequest {
    string query = 1;
    string capability_filter = 2;        // "tts", "tools", "ai_provider", etc.
    string sort = 3;                     // "popular", "newest", "updated"
    int32 page = 4;
    int32 page_size = 5;
}

message PluginBrowseResponse {
    repeated PluginRegistryEntry entries = 1;
    int32 total = 2;
}

message PluginRegistryEntry {
    string id = 1;
    string name = 2;
    string version = 3;
    string description = 4;
    string author = 5;
    repeated string capabilities = 6;
    string repository_url = 7;
    string icon_url = 8;
    int32 downloads = 9;
    int32 stars = 10;
    bool installed = 11;
    string installed_version = 12;
    string updated_at = 13;
}

message SideloadPluginRequest {
    string path = 1;                     // Local directory path
}

message ImportPluginFileRequest {
    string path = 1;                     // Local path to .astraplugin file
    bool auto_start = 2;                 // Start after install (default true)
}

message PluginLogsRequest {
    string plugin_id = 1;
    int32 lines = 2;                     // Last N lines (default 100)
}

message PluginLogsResponse {
    repeated string lines = 1;
}

message PluginUpdatesResponse {
    repeated PluginUpdateInfo updates = 1;
}

message PluginUpdateInfo {
    string plugin_id = 1;
    string name = 2;
    string installed_version = 3;
    string latest_version = 4;
    string changelog = 5;
}

// ============ Plugin Messages — Host (PluginHostService) ============

message PluginRegisterRequest {
    string plugin_id = 1;
    uint32 port = 2;                     // Plugin's gRPC server port
    repeated string capabilities = 3;
    string auth_token = 4;               // Auth token for registration verification
}

message PluginRegisterResponse {
    bool success = 1;
    string error = 2;
    string config_json = 3;             // Plugin's current config
    string daemon_version = 4;
}

message PluginEventFilter {
    string plugin_id = 1;
    repeated string event_types = 2;     // Empty = all events
}

message PluginEventMsg {
    string event_type = 1;
    string payload_json = 2;
    int64 timestamp = 3;
}

message PluginChatRequest {
    string text = 1;
    string source_id = 2;               // Plugin ID as source
    string conversation_id = 3;         // Empty = active conversation
    bool voice_enabled = 4;
}

message PluginChatChunk {
    oneof content {
        string text = 1;
        bool done = 2;
        string error = 3;
    }
    string message_id = 4;
}

message PluginFireTriggerRequest {
    string trigger_type = 1;             // e.g. "plugin__twitch__donation"
    string payload_json = 2;             // Trigger-specific data as JSON
}

message PluginSelfIdRequest {
    string plugin_id = 1;
}

message PluginSelfConfigResponse {
    string config_json = 1;
}

message PluginLogRequest {
    string plugin_id = 1;
    string level = 2;                    // "debug", "info", "warn", "error"
    string message = 3;
}

message PluginDaemonInfoResponse {
    string version = 1;
    string state = 2;
    uint32 grpc_port = 3;
}

message PluginSetVariableRequest {
    string plugin_id = 1;
    string name = 2;
    string value = 3;
    string scope = 4;                    // "session" (default) or "persistent"
}

// ============ Plugin Messages — Capability (PluginCapabilityService) ============

// ── Tools ──

message PluginToolDef {
    string name = 1;
    string description = 2;
    string parameters_json = 3;          // JSON Schema for parameters
}

message PluginToolListResponse {
    repeated PluginToolDef tools = 1;
}

message PluginCallToolRequest {
    string tool_name = 1;
    string arguments_json = 2;
}

message PluginCallToolResponse {
    bool success = 1;
    string result = 2;
    string error = 3;
}

// ── TTS ──

message PluginTtsSynthesizeRequest {
    string text = 1;
    string voice_id = 2;
    float speed = 3;
    float pitch = 4;
}

message PluginTtsSynthesizeResponse {
    bytes audio_data = 1;
    string format = 2;                   // "mp3", "wav", "pcm", "ogg"
    uint32 sample_rate = 3;
    uint32 duration_ms = 4;
}

message PluginAudioChunk {
    bytes data = 1;
    bool is_last = 2;
    uint32 sample_rate = 3;              // Only needed on first chunk
}

message PluginVoiceInfo {
    string id = 1;
    string name = 2;
    string language = 3;
    string gender = 4;                   // "male", "female", "neutral"
    string preview_url = 5;
}

message PluginTtsVoicesResponse {
    repeated PluginVoiceInfo voices = 1;
}

// ── STT ──

message PluginSttEvent {
    string text = 1;
    bool is_final = 2;
    float confidence = 3;
    string language = 4;
}

message PluginSttLanguagesResponse {
    repeated string languages = 1;
}

// ── AI Provider ──

message PluginAiCompleteRequest {
    repeated PluginAiMessage messages = 1;
    repeated PluginToolDef tools = 2;
    string system_prompt = 3;
    float temperature = 4;
    uint32 max_tokens = 5;
    string model = 6;
}

message PluginAiMessage {
    string role = 1;                     // "user", "assistant", "system", "tool"
    string content = 2;
    string tool_call_id = 3;
    repeated PluginAiToolCall tool_calls = 4;
}

message PluginAiToolCall {
    string id = 1;
    string name = 2;
    string arguments_json = 3;
}

message PluginAiStreamChunk {
    oneof content {
        string text_delta = 1;
        PluginAiToolCall tool_call = 2;
        string thinking_delta = 3;
        bool done = 4;
        string error = 5;
    }
}

message PluginAiModelsResponse {
    repeated PluginAiModelInfo models = 1;
    string default_model = 2;
}

message PluginAiModelInfo {
    string id = 1;
    string name = 2;
}

// ── Actions ──

message PluginExecuteActionRequest {
    string action_type = 1;
    string params_json = 2;
}

message PluginExecuteActionResponse {
    bool success = 1;
    string result = 2;
    string error = 3;
}

message PluginActionTypesResponse {
    repeated ActionTypeDefinitionMsg types = 1;
}

// ── Triggers ──

message PluginTriggerTypesResponse {
    repeated TriggerTypeDefinitionMsg types = 1;
}

// ── UI Contributions ──

message PluginUiContribution {
    string id = 1;
    string slot = 2;                     // Named slot: "page.custom", "background.behind", etc.
    string css_target = 3;               // CSS selector for injection fallback
    string position = 4;                 // For CSS injection: "before"|"after"|"replace"|"prepend"|"append"
    string url = 5;                      // Relative path in ui/ dir: "index.html"
    string label = 6;                    // Display name (for pages, settings sections)
    string icon_svg = 7;                 // SVG markup for nav tab icon
    int32 width = 8;                     // 0 = fill container
    int32 height = 9;
    bool transparent = 10;               // Transparent iframe background (for effects)
    bool pointer_events = 11;            // Whether iframe captures mouse events
    int32 z_index = 12;                  // Layer ordering
    map<string, string> props = 13;      // Extra properties (e.g., "audio": "true")
}

message PluginUiContributionsResponse {
    repeated PluginUiContribution contributions = 1;
}

message PluginUiContributionWithMeta {
    string plugin_id = 1;
    string plugin_name = 2;
    PluginUiContribution contribution = 3;
}

message AllUiContributionsResponse {
    repeated PluginUiContributionWithMeta contributions = 1;
}

message PluginThemeContribution {
    string plugin_id = 1;
    string theme_name = 2;
    string theme_description = 3;
    map<string, string> css_variables = 4;
    string wallpaper_path = 5;           // Relative to ui/ dir
    string wallpaper_mode = 6;           // "cover", "contain", "tile"
    float wallpaper_opacity = 7;         // 0.0–1.0
    string fragment_shader = 8;          // GLSL replacement for Threads effect
    string effect_config_json = 9;       // Uniforms/params for the shader
}

message ActiveThemesResponse {
    repeated PluginThemeContribution themes = 1;
}

// ── UI Calls (bidirectional plugin UI ↔ backend communication) ──

message PluginUiCallRequest {
    string method = 1;
    string params_json = 2;
}

message PluginUiCallResponse {
    string result_json = 1;
    string error = 2;
}

message PluginUiPushRequest {
    string plugin_id = 1;
    string event = 2;
    string payload_json = 3;
}

message CallPluginFromUiRequest {
    string plugin_id = 1;
    string method = 2;
    string params_json = 3;
}

message CallPluginFromUiResponse {
    string result_json = 1;
    string error = 2;
}

// ── Lifecycle ──

message PluginConfigChangedMsg {
    string config_json = 1;
}

message PluginActiveTriggersMsg {
    repeated string trigger_types = 1;
}

message PluginHealthResponse {
    bool healthy = 1;
    string status = 2;
}
