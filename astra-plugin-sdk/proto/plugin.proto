// ============ MCP Service ============

service McpService {
    // List all configured MCP servers with status and tools
    rpc ListServers(Empty) returns (McpServerListResponse);

    // Add a new MCP server configuration
    rpc AddServer(McpServerConfigMsg) returns (McpServerConfigMsg);

    // Update an existing MCP server configuration
    rpc UpdateServer(McpServerConfigMsg) returns (Empty);

    // Remove an MCP server
    rpc RemoveServer(McpServerIdRequest) returns (Empty);

    // Start a specific MCP server
    rpc StartServer(McpServerIdRequest) returns (Empty);

    // Stop a specific MCP server
    rpc StopServer(McpServerIdRequest) returns (Empty);

    // Get tools for a specific server
    rpc GetServerTools(McpServerIdRequest) returns (McpToolListResponse);

    // Enable/disable a specific tool on a server
    rpc SetToolEnabled(McpSetToolEnabledRequest) returns (Empty);

    // Refresh tools from a running server
    rpc RefreshServerTools(McpServerIdRequest) returns (McpToolListResponse);

    // Catalog operations
    rpc SearchCatalog(CatalogSearchRequest) returns (CatalogSearchResponse);
    rpc GetCatalogServer(CatalogServerRequest) returns (CatalogServerMsg);
    rpc InstallCatalogServer(InstallCatalogRequest) returns (McpServerConfigMsg);

    // Runtime management
    rpc CheckRuntimes(Empty) returns (RuntimeStatusListResponse);
    rpc InstallRuntime(InstallRuntimeRequest) returns (InstallRuntimeResponse);
}

message McpServerConfigMsg {
    string id = 1;
    string name = 2;
    string transport_json = 3;      // McpTransport serialized as JSON
    bool enabled = 4;
    bool auto_start = 5;
    map<string, bool> tool_overrides = 6;
    uint64 timeout_secs = 7;
    string catalog_id = 8;          // Registry server name if installed from catalog
    string catalog_version = 9;     // Version at time of install
}

message McpServerStatusMsg {
    McpServerConfigMsg config = 1;
    string status = 2;              // "stopped", "starting", "running", "error"
    string error = 3;
    repeated McpToolInfoMsg tools = 4;
}

message McpServerListResponse {
    repeated McpServerStatusMsg servers = 1;
}

message McpServerIdRequest {
    string server_id = 1;
}

message McpToolInfoMsg {
    string name = 1;                // Original tool name
    string description = 2;
    string input_schema_json = 3;   // JSON Schema as string
    bool enabled = 4;
    string namespaced_name = 5;     // mcp__servername__toolname
}

message McpToolListResponse {
    repeated McpToolInfoMsg tools = 1;
}

message McpSetToolEnabledRequest {
    string server_id = 1;
    string tool_name = 2;
    bool enabled = 3;
}

// ---- MCP Catalog messages ----

message CatalogSearchRequest {
    string query = 1;           // Search term (empty = browse all)
    string cursor = 2;          // Pagination cursor (empty = first page)
    uint32 limit = 3;           // Results per page (default 50, max 96)
}

message CatalogSearchResponse {
    repeated CatalogServerMsg servers = 1;
    string next_cursor = 2;     // Empty if no more results
    uint32 total_hint = 3;      // Approximate total (if registry provides)
}

message CatalogServerMsg {
    string name = 1;                    // "namespace/server-name"
    string version = 2;
    string title = 3;                   // Display name (may be empty)
    string description = 4;
    string website_url = 5;
    string icon_url = 6;
    string repository_url = 7;
    bool is_installed = 8;
    string published_at = 9;
    string updated_at = 10;
    repeated CatalogPackageMsg packages = 11;
    repeated CatalogRemoteMsg remotes = 12;
}

message CatalogPackageMsg {
    string registry_type = 1;           // "npm", "pypi", "oci"
    string identifier = 2;
    string version = 3;
    string transport = 4;               // "stdio", "streamable-http", "sse"
    string runtime_hint = 5;            // "npx", "uvx", "docker" (may be empty)
    repeated string runtime_arguments = 6;
    repeated CatalogEnvVarMsg environment_variables = 7;
}

message CatalogEnvVarMsg {
    string name = 1;
    string description = 2;
    bool is_secret = 3;
    bool is_required = 4;
    string default_value = 5;
    repeated string choices = 6;
}

message CatalogRemoteMsg {
    string transport_type = 1;          // "streamable-http" or "sse"
    string url = 2;
    repeated string headers = 3;
}

message CatalogServerRequest {
    string name = 1;
}

message InstallCatalogRequest {
    string server_name = 1;
    uint32 package_index = 2;           // 0 = auto-select best
    map<string, string> env_values = 3;
    bool auto_start = 4;
}

// ---- MCP Runtime messages ----

message RuntimeStatusMsg {
    string id = 1;              // "nodejs", "python", etc.
    string display_name = 2;    // "Node.js"
    bool installed = 3;
    string version = 4;         // "v20.11.1" or empty
    string resolved_path = 5;   // full path or empty
    string winget_id = 6;       // for install button
    string download_url = 7;    // fallback manual download
}

message RuntimeStatusListResponse {
    repeated RuntimeStatusMsg runtimes = 1;
}

message InstallRuntimeRequest {
    string runtime_id = 1;      // "nodejs", "python", etc.
}

message InstallRuntimeResponse {
    bool success = 1;
    string message = 2;         // output or error text
    string version = 3;         // newly detected version after install
}

// ============ Marketplace Service ============

service MarketplaceService {
    // Browse / search marketplace listings
    rpc Browse(MarketplaceBrowseRequest) returns (MarketplaceBrowseResponse);

    // Get featured / staff-pick listings
    rpc GetFeatured(Empty) returns (MarketplaceBrowseResponse);

    // Get single listing full details
    rpc GetListing(MarketplaceGetListingRequest) returns (MarketplaceListingDetail);

    // Install a marketplace command (download + create local command)
    rpc Install(MarketplaceInstallRequest) returns (MarketplaceInstallResponse);

    // Check for updates on installed marketplace commands
    rpc CheckUpdates(Empty) returns (MarketplaceCheckUpdatesResponse);

    // Update an installed marketplace command to latest version
    rpc UpdateInstalled(MarketplaceUpdateInstalledRequest) returns (MarketplaceInstallResponse);

    // Uninstall a marketplace command
    rpc Uninstall(MarketplaceUninstallRequest) returns (Empty);

    // Get all installed marketplace commands with status
    rpc GetInstalled(Empty) returns (MarketplaceGetInstalledResponse);

    // Publish a local command to the marketplace
    rpc Publish(MarketplacePublishRequest) returns (MarketplaceListingDetail);

    // Get current user's published listings
    rpc GetMyListings(Empty) returns (MarketplaceBrowseResponse);

    // Star or unstar a listing
    rpc ToggleStar(MarketplaceToggleStarRequest) returns (MarketplaceToggleStarResponse);

    // Submit or update a review
    rpc SubmitReview(MarketplaceSubmitReviewRequest) returns (MarketplaceReview);

    // Get reviews for a listing
    rpc GetReviews(MarketplaceGetReviewsRequest) returns (MarketplaceGetReviewsResponse);

    // Report a listing
    rpc ReportListing(MarketplaceReportRequest) returns (Empty);
}

// --- Browse ---

message MarketplaceBrowseRequest {
    string query = 1;           // full-text search
    string category = 2;       // filter by category
    string sort = 3;           // popular, newest, top_rated, trending
    int32 page = 4;            // 1-based
    int32 page_size = 5;       // max 50
    float min_rating = 6;      // minimum average rating
}

message MarketplaceBrowseResponse {
    repeated MarketplaceListingSummary listings = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
    int32 total_pages = 5;
}

message MarketplaceListingSummary {
    string id = 1;
    string author_id = 2;
    string author_name = 3;
    string title = 4;
    string short_description = 5;
    string category = 6;
    repeated string tags = 7;
    int32 version = 8;
    string version_label = 9;
    int32 download_count = 10;
    int32 star_count = 11;
    float rating_average = 12;
    int32 rating_count = 13;
    repeated string capabilities = 14;
    string screenshot_thumbnail = 15;   // first screenshot or empty
    bool featured = 16;
    bool starred_by_me = 17;
    bool installed = 18;
    int32 installed_version = 19;       // 0 = not installed
    Timestamp published_at = 20;
    string status = 21;                 // draft, published, unlisted, removed
}

// --- Listing Detail ---

message MarketplaceGetListingRequest {
    string id = 1;
}

message MarketplaceListingDetail {
    string id = 1;
    string author_id = 2;
    string author_name = 3;
    string title = 4;
    string short_description = 5;
    string description = 6;
    string category = 7;
    repeated string tags = 8;
    int32 version = 9;
    string version_label = 10;
    string changelog = 11;
    string status = 12;
    int32 download_count = 13;
    int32 star_count = 14;
    float rating_average = 15;
    int32 rating_count = 16;
    repeated string capabilities = 17;
    repeated string screenshots = 18;
    bool featured = 19;
    bool starred_by_me = 20;
    bool installed = 21;
    int32 installed_version = 22;
    Timestamp created_at = 23;
    Timestamp updated_at = 24;
    Timestamp published_at = 25;
    string command_data_json = 26;
}

// --- Install / Uninstall ---

message MarketplaceInstallRequest {
    string listing_id = 1;
}

message MarketplaceInstallResponse {
    string local_command_id = 1;
    string listing_id = 2;
    string title = 3;
}

message MarketplaceUpdateInstalledRequest {
    string listing_id = 1;
}

message MarketplaceUninstallRequest {
    string listing_id = 1;
    bool delete_local_command = 2;
}

message MarketplaceGetInstalledResponse {
    repeated MarketplaceInstalledCommand items = 1;
}

message MarketplaceInstalledCommand {
    string listing_id = 1;
    string local_command_id = 2;
    string title = 3;
    int32 installed_version = 4;
    int32 latest_version = 5;
    bool has_update = 6;
}

// --- Updates ---

message MarketplaceCheckUpdatesResponse {
    repeated MarketplaceUpdate updates = 1;
}

message MarketplaceUpdate {
    string listing_id = 1;
    string title = 2;
    int32 installed_version = 3;
    int32 latest_version = 4;
    string latest_version_label = 5;
    string changelog = 6;
    string local_command_id = 7;
}

// --- Publish ---

message MarketplacePublishRequest {
    string local_command_id = 1;        // local command UUID to publish
    string title = 2;
    string short_description = 3;
    string description = 4;
    string category = 5;
    repeated string tags = 6;
    repeated string screenshots = 7;    // base64 PNGs
    string listing_id = 8;             // empty = new, existing = update
    string changelog = 9;
    string status = 10;                // published or unlisted
    string version_label = 11;
