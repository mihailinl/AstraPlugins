[plugin]
id = "telegram-client"
name = "Telegram Bot"
version = "0.1.0"
description = "Bridge Telegram bot topics to Astra conversations with full sync and streaming"
author = "Astra Team"
license = "MIT"

[entry]
command = "target/release/telegram_client.exe"

[capabilities]
client = true

[config]
schema = """
{
  "type": "object",
  "properties": {
    "bot_token": {
      "type": "string",
      "title": "Bot Token",
      "description": "Telegram Bot API token from @BotFather"
    },
    "allowed_usernames": {
      "type": "string",
      "title": "Allowed Usernames",
      "description": "Comma-separated Telegram usernames (without @) allowed to use the bot. Leave empty to allow all."
    }
  },
  "required": ["bot_token"]
}
"""
