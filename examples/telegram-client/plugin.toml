[plugin]
id = "telegram-client"
name = "Telegram Bot"
version = "0.1.0"
description = "Bridge Telegram bot topics to Astra conversations with full sync and streaming"
author = "Astra Team"
license = "MIT"

[entry]
command = "target/release/telegram_client.exe"

[capabilities]
client = true

[config]
schema = """
{
  "type": "object",
  "properties": {
    "bot_token": {
      "type": "string",
      "title": "$config.bot_token.title",
      "description": "$config.bot_token.description"
    },
    "allowed_usernames": {
      "type": "string",
      "title": "$config.allowed_usernames.title",
      "description": "$config.allowed_usernames.description"
    }
  },
  "required": ["bot_token"]
}
"""
